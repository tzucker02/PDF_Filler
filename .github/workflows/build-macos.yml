name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.12"

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          python -m pip install "briefcase>=0.3.20"

      - name: Create macOS project files
        run: briefcase create macOS -v

      - name: Build macOS app
        run: briefcase build macOS -v

      - name: Package macOS app (dmg)
        run: briefcase package macOS --adhoc-sign -v

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Filler-macOS-${{ github.run_number }}
          path: |
            dist/*.dmg
            dist/*.pkg
            dist/*.zip
            dist/*.app
          if-no-files-found: error
