name: Build macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          python -m pip install "briefcase>=0.3.20"

      - name: Create or update macOS project files
        shell: bash
        run: |
          if [ -d "build/pdf_filler/macos" ]; then
            briefcase update macOS
          else
            briefcase create macOS
          fi

      - name: Build macOS app
        run: briefcase build macOS

      - name: Package macOS app
        run: briefcase package macOS

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Filler-macOS-${{ github.run_number }}
          path: |
            dist/*.dmg
            dist/*.pkg
            dist/*.zip
          if-no-files-found: error
